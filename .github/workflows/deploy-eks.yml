name: CI/CD Tienda Perritos - DB


on:
  push:
    branches: [ "main" ]
    paths:
      - "db/**"
  workflow_dispatch: {}

env:
  ECR_REPO_DB: tienda-perritos-db


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Listando el contenido actual del repositorio:"
          ls -R
          cd db
          docker build -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Desplegar Base de Datos en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          # Aplicar archivos de Kubernetes (asegúrate de que existan en la carpeta k8s-db)
          kubectl apply -f k8s-db/namespace.yaml
          kubectl apply -f k8s-db/mysql-secret.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s-db/mysql-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s-db/mysql-service.yaml -n $EKS_NAMESPACE
          
          # Actualizar el deployment con la imagen recién creada
          kubectl set image deployment/tienda-perritos-db \
            mysql=$ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
            
          kubectl rollout status deployment/tienda-perritos-db -n $EKS_NAMESPACE
